# Codex MCP proxy config.
# Copy this to apps/angular-demo/.codex/config.toml and run the compact proxy on localhost:9100.

[mcp_servers.jira]
url = "http://localhost:9100/mcp?target=jira"
startup_timeout_sec = 10
tool_timeout_sec = 60

[mcp_servers.github]
url = "http://localhost:9100/mcp?target=github"
startup_timeout_sec = 10
tool_timeout_sec = 60

[mcp_servers.confluence]
url = "http://localhost:9100/mcp?target=confluence"
startup_timeout_sec = 10
tool_timeout_sec = 60

[mcp_servers.sentry]
url = "http://localhost:9100/mcp?target=sentry"
startup_timeout_sec = 10
tool_timeout_sec = 60

[mcp_servers.testrail]
url = "http://localhost:9100/mcp?target=testrail"
startup_timeout_sec = 10
tool_timeout_sec = 60
